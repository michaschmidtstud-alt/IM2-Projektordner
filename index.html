    <div class="huettenInfo" id="huettenInfoFruendenhuette" hidden>
      <h3>Fründenhütte SAC</h3>
      <p>Tausend Meter direkt über dem Oeschinensee. Die Hütte für erfahrene, trittsichere Bergwanderer und Hochalpinisten ist umgeben von Fels und Eis. Einst vom Fründengletscher umflossen, reicht seine Zuge heute bis knapp hinter die Hütte und bildet eine reizvolle Landschaft mit kleinen Moränenseen. Teils exponierte Stellen auf dem direkten Hüttenweg. 
        Die Fründschnuer hinten am Oeschinensee ist besonders attraktiv für wirklich Trittsichere und Schwindelfreie.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/fruendenhuette-sac-2147000102/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: Juli-September<br>
        Schlafplätze: 58<br>
        Aufstieg: 3:30-4h übere die Untere Fründschnuer
      </p>
    </div>

    <div class="huettenInfo" id="huettenInfoGaulihuette" hidden>
      <h3>Gaulihütte SAC</h3>
      <p>Im hinteren Urbachtal am SE-Fuss des Hangendgletscherhorns gelegen. Eigentum der SAC-Sektion Bern, 65 Plätze. Hüttenbewartung während der Frühlings- und Sommersaison. Ausgangspunkt für Hochtouren und alpine Skitouren im östlichen Berner Oberland. Klettern an griffigem Gneis oder der Blick auf den Gauligletscher und die Seen im Vorfeld sind Höhepunkte um diese Hütte. Speziell für Kinder eingerichtete Felsen, der Ausflug zum Gletscher, 
        Baden an den Chipfenseeli und organisierte Kinderkletterlager begeistern Familien. Spezielle «Dakota-Touren» zum Absturzort des amerikanischen Flugzeuges.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/gaulihuette-sac-2147000111/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: April-September<br>
        Schlafplätze: 65<br>
        Aufstieg: 4:30h aus dem Urbachtal
      </p>
    </div>

    <div class="huettenInfo" id="huettenInfoGeltenhuette" hidden>
      <h3>Geltenhütte SAC</h3>
      <p>Vom idyllischen Lauenensee an wilden Schluchten und dem donnernden Geltenschuss vorbei, zuletzt hinter dem kleinen Wasserfall durch – der Zustieg zur Wander- und Bergsteigerhütte am Fusse des Wildhorns ist allein schon ein eindrückliches Bergerlebnis. Die Unterkunft mit grosser Gaststube und abgetrennten Schlafplätzen eignet sich für Vereins- und Schulreisen sowie für Familien. 
        Ein wunderschöner Rundweg führt durch das Furggental und das Rottal zurück zur Hütte, Dauer ca. 2h. Im Frühling vielfältige Ski- und Schneeschuhtouren.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/geltenhuette-sac-2147000113/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: März und April, Juli-September<br>
        Schlafplätze: 70<br>
        Aufstieg: 3:15h von Lauenen 
      </p>
    </div>

    <div class="huettenInfo" id="huettenInfoGlecksteinhuette" hidden>
      <h3>Glecksteinhütte SAC</h3>
      <p>Ihr Name stammt von «Gläck» (Viehsalz), das die Hirten den Schafen im Sommer zum Stein brachten. Die SAC-Hütte zum Grindelwalder Wetterhorn, einst als Hotel Gleckstein bekannt, ist heute beliebt bei Alpinisten für Besteigungen und Gletschertouren, als kleiner Seminarort, aber auch bei Bergwanderern, die imposante Gebirgspanoramen suchen und im Aufstieg «Tucki», 
        dem Chef der Steinbockkolonie, begegnen oder die Ruinen des legendären Wetterhornaufzuges bestaunen.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/glecksteinhuette-sac-2147000118/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: Juli-September<br>
        Schlafplätze: 70<br>
        Aufstieg: 2:15-2:45h von Grindelwald
      </p>
    </div>

      <h3>Gspaltenhornhütte SAC</h3>
      <p>Die Zacken und Türme des Gspaltenhorns, Kamel und Roti Zend sind weitherum bekannt. Am Fusse dieser imposanten Felsen, zuhinterst im Kiental, auf einem schmalen Felsvorsprung hoch über dem Gamchigletscher liegt die kürzlich modernisierte Alpin- und Sommerhütte. Neben Besteigungen sind Übergange zu benachbarten Hütten und Tälern (Sefinenfurgga, Hohtürli, 
        Gamchilücke) beliebt. Die Hütte ist eine der 18 bewarteten SAC-Unterkünfte im Unesco-Welterbe.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/gspaltenhornhuette-sac-2147000127/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: Juli-September<br>
        Schlafplätze: 60<br>
        Aufstieg: 3:30h von der Griesalp über Steineberg
      </p>
    </div>

      <h3>Hohganthütte SAC</h3>
      <p>Die Hohganthütte ist im Besitz der SAC-Sektion Emmental. Knapp unterhalb der Waldgrenze steht diese ausgesprochen gemütliche Hütte. Sie ist für Selbstversorgung eingerichtet und nicht bewartet. Die Hütte ist grundsätzlich geschlossen und eine Reservation ist notwendig.
         Nach der Reservation erhält man einen Zugangscode für das Türschloss. Alle weiteren Informationen auf der Website.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/hohganthuette-2147000133/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: Ganzen Jahr offen, nicht bewartet<br>
        Schlafplätze: 24<br>
        Aufstieg: 3:30h von Kemmeribodenbad oder 3:30h von Habkern
      </p>
    </div>

    <div class="huettenInfo" id="huettenInfoOberaletschhuette" hidden>
      <h3>Oberaletschhuette SAC</h3>
      <p>Massives Steinhaus am Fusse der Fusshörner, mitten im alpinen Gletschergebiet von Aletschhorn, Schinhorn und Nesthorn. Die Hütte ist Ausgangspunkt für vielfältige Ski-, Berg- und Klettertouren. Wegen des Gletscherrückgangs wurde der direkte Weg über den Oberaletschgletscher immer schwieriger und für viele Leute unbegehbar. 
        Der neue Panoramaweg via Lochegga gilt heute als touristische Attraktion im Unesco-Welterbegebiet.</p>
      <a href="https://www.sac-cas.ch/de/huetten-und-touren/sac-tourenportal/oberaletschhuette-sac-2147000193/" class="mehr-btn">Mehr Informationen</a>
      <p class="meta">
        offen: April und Juli-September<br>
        Schlafplätze: 58<br>
        Aufstieg: 4:30h von der Belalp
      </p>
    </div>
