<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise and Sunset Time</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@calendarjs/ce/dist/style.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Material+Icons" />
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.js"></script>
</head>
<body>
    <header>
        <h1>Vorlage für interaktive Medien II</h1>

    </header>
    <main>

         <!-- HERO: mountain image + floating sun illustrations -->
    <div class="hero">
      <div class="hero-image-wrap">
        <img class="hero-mountain" src="images/Eiger-Mönch-Jungfrau_GPT.png" alt="Bergpanorama">
      </div>
    
<!-- blinzelnde Sünnelis :) -->
    <dotlottie-player
  class="sun sun-left"
  src="/sunrise/sun/image2lottie-animation.lottie"
  autoplay
  loop
>
</dotlottie-player>
    <dotlottie-player
  class="sun sun-right"
  src="/sunrise/sun/image2lottie-animation-2.lottie"
  autoplay
  loop
>
</dotlottie-player>

</div>

        <h2>Main Content</h2>
          <!-- Liste der Hütten -->
        <div class="hut-col" id="menu">
            <select id="huette" name="huette" autocomplete="off">
            <option value="" selected disabled>Hütte auswählen</option>
            <option value="balmhornhuette">Balmhornhütte</option>
            <option value="doldenhornhuette">Doldenhornhütte</option>
            <option value="dossenhuette">Dossenhütte</option>
            <option value="fruendenhuette">Fründenhütte</option>
            <option value="gaulihuette">Gaulihütte</option>
            <option value="geltenhuette">Geltenhütte</option>
            <option value="glecksteinhuette">Glecksteinhütte</option>
            <option value="gspaltenhornhuette">Gspaltenhornhütte</option>
            <option value="hohganthuette">Hohganthütte</option>
            <option value="oberaletschhuette">Oberaletschhütte</option>
            <option value="sustlihuette">Sustlihütte</option>
            <option value="wildhornhuette">Wildhornhütte</option>
            <option value="wildstrubelhuette">Wildstrubelhütte</option>
            </select>

            <div id="calendarContainer">
                <button type="button" id="dateSelector">Datum wählen</button>
                <div id='date'></div>
            </div>

            <div id="sonnenaufgang">
                <p id="sunriseText">Sunrise:</p>
            </div>

            <div id="sonnenuntergang">
                <p id="sunsetText">Sunset:</p>
            </div>
        </div>

        <div class="huettenInfo" hidden></div>

       
    </main>
    <footer>
        <p>Created by Jonas Schönenberger and Micha Schmidt, FHGR Multimedia Production</p>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/lemonadejs/dist/lemonade.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@calendarjs/ce/dist/index.min.js"></script>
    <script src="js/script.js" type="module"></script>
</body>
</html>
